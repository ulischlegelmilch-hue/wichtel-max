; PlatformIO – Wichtel Max Firmware (zwei Boards, board.h schaltet über das Flag um)
;
;   Standard-Build  = Waveshare ESP32-S3-ePaper-1.54 (200x200, SSD1681)
;   Alternativ      = Elecrow CrowPanel ESP32-S3 4.2" (400x300, SSD1683)
;
; Ordner "firmware" in VS Code mit PlatformIO IDE öffnen und Upload drücken
; (baut das default_envs-Board). Für das andere Board in der PlatformIO-
; Leiste die passende Umgebung wählen.

[platformio]
default_envs = waveshare-esp32s3-154

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1        ; serielle Ausgabe über USB-C
  -D ARDUINO_USB_MODE=1
lib_deps =
  zinggjm/GxEPD2@^1.5.8                ; E-Paper-Treiber (nutzt Adafruit GFX)
  adafruit/Adafruit GFX Library@^1.11.9
  knolleary/PubSubClient@^2.8          ; MQTT
  bblanchon/ArduinoJson@^7.1.0

; ---- Waveshare ESP32-S3-ePaper-1.54 (200x200, SSD1681) -------------------
; Echte HW ist ESP32-S3-PICO-1: 8 MB embedded Flash + 8 MB PSRAM (per esptool
; ausgelesen; PSRAM hier ungenutzt). NICHT 16 MB — sonst Partitionen jenseits
; des Flash -> Bootloader-Reset-Loop.
[env:waveshare-esp32s3-154]
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
build_flags =
  ${env.build_flags}
  -D BOARD_WAVESHARE_154

; ---- Elecrow CrowPanel ESP32-S3 4.2" (400x300, SSD1683) -----------------
; Falls dein CrowPanel nur 4 MB Flash hat: flash_size = 4MB, partitions = default.csv
[env:crowpanel-esp32s3-42]
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL_42
