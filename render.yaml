# Render-Blueprint fürs Wichtel-Max-Backend.
# Auf render.com: "New +" -> "Blueprint" -> dieses Repo wählen. Render liest
# diese Datei, legt den Web-Service an und setzt die Umgebungsvariablen.
#
# Kostenlos ("Free"-Instanz) reicht zum Loslegen. Zwei Eigenheiten der Free-Stufe:
#  1. Schläft nach ~15 min Inaktivität ein, braucht dann ein paar Sekunden zum
#     Aufwachen – für den Wichtel unkritisch (er pollt eh nur alle 30 min).
#  2. KEINE persistente Disk (nur in bezahlten Plänen). Deshalb liegt state.json
#     im (flüchtigen) Container: Nachrichten kommen live an, aber Verlauf/Aufgaben
#     können bei einem Neustart/Deploy zurückgesetzt werden. Für dauerhaften
#     Speicher später auf einen bezahlten Plan (ab ~7 $/Monat) wechseln und dann
#     eine Disk + STATE_DIR=/data ergaenzen (siehe backend/.env.example).
services:
  - type: web
    name: wichtel-max-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/state
    envVars:
      - key: ENABLE_MQTT      # in der Cloud keinen MQTT-Broker (nur HTTP)
        value: "0"
      - key: DEVICE_ID
        value: max
